<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        h1 {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white; /* IMPORTANT FIX */
            width: 250px;
            margin: 15px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px;
            color: black; /* FIX */
        }

        .card p {
            color: #333; /* FIX */
        }

        button {
            background: #ff7e5f;
            color: white;
            border: none;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #ff5e3a;
        }

        .cart-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 25px;
            background: #00c9a7;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            width: 150px;
            text-align: center;
        }
    </style>
</head>

<body>

<h1>{{ restaurant }} Menu</h1>

<div class="container">

{% for food in foods %}
    <div class="card">

        <img src="{{ food.image }}" alt="{{ food.name }}">

        <h3>{{ food.name }}</h3>
        <p>₹{{ food.price }}</p>

        <form action="/add_to_cart" method="post">
            <input type="hidden" name="item" value="{{ food.name }}">
            <input type="hidden" name="price" value="{{ food.price }}">
            <button type="submit">Add to Cart</button>
        </form>

    </div>
{% endfor %}

</div>

<a href="/cart" class="cart-btn">🛒 View Cart</a>

</body>
</html>
