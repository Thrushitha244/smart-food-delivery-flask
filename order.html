<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: green;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #27ae60;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #1e8449;
        }
    </style>
</head>

<body>

<div class="box">

    
<!DOCTYPE html>
<html>
<head>
<title>Order Success</title>
</head>

<body style="text-align:center; margin-top:100px;">

<h1>🎉 Order Placed Successfully!</h1>

<h2>Total: ₹{{ total }}</h2>

<p>📍 Delivery Location: {{ location }}</p>
<p>💳 Payment Method: {{ payment }}</p>

<a href="/dashboard">
<button>Back Home</button>
</a>

</body>
</html>
